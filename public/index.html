<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Premium To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container glass-panel">
        <header>
            <h1>TaskMaster</h1>
            <p>Manage your daily goals</p>
        </header>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
            <button id="addBtn"><i class="fas fa-plus"></i></button>
        </div>

        <div class="controls">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <div class="counter">
                <span id="taskCount">0</span> tasks pending
            </div>
        </div>

        <ul id="taskList">
            <!-- Tasks will be dynamically injected here -->
            <div class="loading">Loading tasks...</div>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
